<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Inspección CTPAT · Gildan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#061428;
    --navy-900:#0b2545;
    --blue-700:#144d91;
    --blue-500:#2c6fbd;
    --blue-300:#6fa8dc;
    --ink:#eef4fb;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(160deg, var(--navy-950) 0%, var(--navy-900) 60%, #0d2c56 100%);
    color:var(--ink);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow:hidden;
  }

  /* fondo: imagen de inspecciones CTPAT, con transparencia */
  .bg-photo{
    position:fixed;
    inset:0;
    z-index:0;
    background-image:url(https://github.com/franciscflores62-collab/INPECCIONES-HN/blob/main/hoy17.jpg);
    background-size:cover;
    background-position:center;
    opacity:0.95;
  }

  .bg-glow{
    position:fixed;
    inset:0;
    z-index:0;
    background:radial-gradient(650px 500px at 50% 78%, rgba(6,20,40,0.55), transparent 70%);
  }

  .content{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    max-width:460px;
  }

  .eyebrow{
    position:fixed;
    top:26px;
    left:50%;
    transform:translateX(-50%);
    z-index:2;
    font-size:22px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--blue-700);
    font-weight:800;
    font-family:'Space Grotesk',sans-serif;
    white-space:nowrap;
  }

  .top-title{
    position:fixed;
    top:64px;
    left:50%;
    transform:translateX(-50%);
    z-index:2;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:32px;
    letter-spacing:0.03em;
    text-transform:uppercase;
    color:var(--blue-700);
    text-shadow:0 1px 12px rgba(255,255,255,0.6);
    text-align:center;
    width:92%;
  }

  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:38px;
    line-height:1.2;
    color:var(--navy-950);
  }

  .cta{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:24px 46px;
    border-radius:20px;
    border:none;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:19px;
    color:#06162e;
    background:linear-gradient(135deg, #bfe0ff 0%, var(--blue-300) 45%, var(--blue-500) 100%);
    text-decoration:none;
    box-shadow:0 16px 34px rgba(44,111,189,0.45), inset 0 1px 0 rgba(255,255,255,0.6);
    transition:transform 0.25s ease, box-shadow 0.25s ease;
  }
  .cta:hover{
    transform:translateY(-2px);
    box-shadow:0 20px 42px rgba(44,111,189,0.55), inset 0 1px 0 rgba(255,255,255,0.7);
  }
  .cta:active{transform:translateY(0);}
  .cta svg.icon{width:18px;height:18px;flex-shrink:0;}

  .footer-note{
    position:fixed;
    bottom:22px;
    left:50%;
    transform:translateX(-50%);
    z-index:2;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.06em;
    color:#ffffff;
    text-shadow:0 1px 4px rgba(0,0,0,0.55), 0 0 12px rgba(0,0,0,0.35);
    text-align:center;
  }

  a:focus-visible, button:focus-visible{
    outline:2px solid var(--blue-300);
    outline-offset:3px;
  }

  @media (max-width:380px){
    .cta{padding:20px 30px;font-size:16px;}
    .eyebrow{font-size:17px;top:20px;}
    .top-title{font-size:22px;top:50px;}
  }
</style>
</head>
<body>

  <div class="bg-photo"></div>
  <div class="bg-glow"></div>

  <div class="eyebrow">GILDAN SEGURIDAD</div>
  <div class="top-title">INSPECCIÓN DE CONTENEDORES</div>

  <div class="content">
    <a class="cta" href="https://app.smartsheet.com/b/form/019f671def83775c8cc25da0b8250725">
      Iniciar envío de inspección
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    </a>
  </div>

  <p class="footer-note">GSD-CMC 2026</p>

</body>
</html>
